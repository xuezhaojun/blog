baseURL = 'https://xuezhaojun.github.io/'
languageCode = 'en-us'
title = 'Zhao Xue'
theme = 'PaperMod'
[pagination]
  pagerSize = 10

enableRobotsTXT = true

[params]
  env = "production"
  author = "Zhao Xue"
  description = "Cloud Native Engineer | K8s Multi-Cluster | AI Agent Builder"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false

  [params.homeInfoParams]
    Title = "Zhao Xue"
    Content = """
Senior Software Engineer with 5 years of experience building Kubernetes multi-cluster management platforms.

Focused on cloud-native architecture and AI agent engineering.
"""

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/xuezhaojun"

[params.cover]
  hiddenInSingle = true

[markup]
  [markup.highlight]
    style = "dracula"
    lineNos = false
    noClasses = false

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[[menus.main]]
  name = "Blog"
  url = "/posts/"
  weight = 1

[[menus.main]]
  name = "Collections"
  url = "/collections/"
  weight = 2

[[menus.main]]
  name = "About"
  url = "/about/"
  weight = 3

[[menus.main]]
  name = "Search"
  url = "/search/"
  weight = 4

[[menus.main]]
  name = "Tags"
  url = "/tags/"
  weight = 5
